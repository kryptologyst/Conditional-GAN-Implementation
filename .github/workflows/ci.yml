name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        ruff check src/ scripts/ demo/ tests/
    
    - name: Format check with black
      run: |
        black --check src/ scripts/ demo/ tests/
    
    - name: Test with pytest
      run: |
        pytest tests/ -v
    
    - name: Test training script (quick run)
      run: |
        python scripts/train_cgan.py --epochs 2 --batch_size 32

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black
    
    - name: Run ruff
      run: ruff check src/ scripts/ demo/ tests/
    
    - name: Run black
      run: black --check src/ scripts/ demo/ tests/
